AWSTemplateFormatVersion: "2010-09-09"
Description: prophet-checker - RDS PostgreSQL (pgvector) + app/db security groups
Transform: AWS::LanguageExtensions

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Two or more subnets in different AZs for the DB subnet group
  SshIngressCidrs:
    Type: CommaDelimitedList
    Description: Trusted IPs allowed to SSH, comma-separated CIDRs, e.g. 203.0.113.7/32,198.51.100.4/32
  DbInstanceClass:
    Type: String
    Default: db.t4g.micro
  DbAllocatedStorage:
    Type: Number
    Default: 20
  DbBackupRetention:
    Type: Number
    Default: 7
    Description: Automated backup retention (days); free-tier plan caps this, pass 1 on a free-tier account
  DbEngineVersion:
    Type: String
    Default: "16.9"
    Description: RDS PostgreSQL version; must be >= 16.5 for pgvector 0.8.0 (16.8 is deprecated on RDS)
  DbName:
    Type: String
    Default: prophet_checker
  DbUsername:
    Type: String
    Default: prophet
  DbPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    AllowedPattern: '[^/@"\s]+'
    ConstraintDescription: 16+ chars; must not contain / @ double-quote or whitespace (RDS master password rules)
    Description: Master password; also goes into the S3 .env DATABASE_URL

Resources:
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      # Do not reword: GroupDescription is immutable, so any edit replaces the SG.
      # That changes its id, which is exported and imported by the compute stack.
      GroupDescription: prophet-checker app box - SSH only from trusted IP
      VpcId: !Ref VpcId

  # One rule per trusted CIDR, as standalone resources rather than an inline
  # SecurityGroupIngress list: Fn::ForEach expands to a map, not a list, so it
  # cannot generate the inline list. '&{}' permits the dots and slash of a CIDR
  # in the generated logical id.
  'Fn::ForEach::SshIngressRules':
    - Cidr
    - !Ref SshIngressCidrs
    - 'AppSshIngress&{Cidr}':
        Type: AWS::EC2::SecurityGroupIngress
        Properties:
          GroupId: !Ref AppSecurityGroup
          IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref Cidr

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: prophet-checker RDS - 5432 from app SG only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSecurityGroup

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: prophet-checker RDS subnet group
      SubnetIds: !Ref SubnetIds

  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: postgres
      EngineVersion: !Ref DbEngineVersion
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: !Ref DbAllocatedStorage
      StorageType: gp3
      MultiAZ: false
      PubliclyAccessible: false
      StorageEncrypted: true
      BackupRetentionPeriod: !Ref DbBackupRetention
      DBName: !Ref DbName
      MasterUsername: !Ref DbUsername
      MasterUserPassword: !Ref DbPassword
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DbSecurityGroup

Outputs:
  DbEndpoint:
    Description: RDS endpoint address (put into S3 .env DATABASE_URL)
    Value: !GetAtt DbInstance.Endpoint.Address
  DbPort:
    Value: !GetAtt DbInstance.Endpoint.Port
  DbName:
    Value: !Ref DbName
  AppSecurityGroupId:
    Description: App SG id - imported by the compute stack
    Value: !Ref AppSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-AppSecurityGroupId"
