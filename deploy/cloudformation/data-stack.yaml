AWSTemplateFormatVersion: "2010-09-09"
Description: prophet-checker - RDS PostgreSQL (pgvector) + app/db security groups

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Two or more subnets in different AZs for the DB subnet group
  SshIngressCidr:
    Type: String
    Description: Your IP in CIDR form, e.g. 203.0.113.7/32
  DbInstanceClass:
    Type: String
    Default: db.t4g.micro
  DbAllocatedStorage:
    Type: Number
    Default: 20
  DbEngineVersion:
    Type: String
    Default: "16.8"
    Description: RDS PostgreSQL version; must be >= 16.5 for pgvector 0.8.0
  DbName:
    Type: String
    Default: prophet_checker
  DbUsername:
    Type: String
    Default: prophet
  DbPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    AllowedPattern: '[^/@"\s]+'
    ConstraintDescription: 16+ chars; must not contain / @ double-quote or whitespace (RDS master password rules)
    Description: Master password; also goes into the S3 .env DATABASE_URL

Resources:
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: prophet-checker app box - SSH only from trusted IP
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshIngressCidr

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: prophet-checker RDS - 5432 from app SG only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSecurityGroup

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: prophet-checker RDS subnet group
      SubnetIds: !Ref SubnetIds

  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: postgres
      EngineVersion: !Ref DbEngineVersion
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: !Ref DbAllocatedStorage
      StorageType: gp3
      MultiAZ: false
      PubliclyAccessible: false
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DBName: !Ref DbName
      MasterUsername: !Ref DbUsername
      MasterUserPassword: !Ref DbPassword
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DbSecurityGroup

Outputs:
  DbEndpoint:
    Description: RDS endpoint address (put into S3 .env DATABASE_URL)
    Value: !GetAtt DbInstance.Endpoint.Address
  DbPort:
    Value: !GetAtt DbInstance.Endpoint.Port
  DbName:
    Value: !Ref DbName
  AppSecurityGroupId:
    Description: App SG id - imported by the compute stack
    Value: !Ref AppSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-AppSecurityGroupId"
