services:
  migrate:
    build: .
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      APP_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./tg_session.session:/app/tg_session.session
    restart: unless-stopped
